<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享失败</title>
    <style>
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0f172a; color:#e5eefc; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
        .card { max-width:640px; padding:32px; border-radius:20px; background:#111827; border:1px solid #334155; }
        .title { margin:0 0 12px; font-size:24px; }
        .desc { margin:0; color:#cbd5e1; line-height:1.7; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="title">分享不可用</h1>
    <p class="desc" th:text="${errorMessage}">分享加载失败</p>
</div>
</body>
</html>
