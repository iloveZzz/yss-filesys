<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${shareInfo.shareName}">分享文件</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #0f172a 0%, #111827 100%); color: #e5eefc; }
        .page { max-width: 1080px; margin: 0 auto; padding: 28px 18px 40px; }
        .hero { background: rgba(15, 23, 42, 0.72); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); box-shadow: 0 20px 60px rgba(2, 6, 23, 0.35); }
        .title { margin: 0 0 10px; font-size: 28px; }
        .meta { display: flex; flex-wrap: wrap; gap: 14px; color: #b6c2d2; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 999px; background: rgba(59, 130, 246, 0.15); color: #bfdbfe; }
        .panel { margin-top: 18px; background: rgba(15, 23, 42, 0.72); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 20px; padding: 20px; }
        .form { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .input { flex: 1; min-width: 240px; border-radius: 12px; border: 1px solid #334155; background: #0b1220; color: #e5eefc; padding: 12px 14px; }
        .btn { border: 0; border-radius: 12px; padding: 12px 16px; background: #2563eb; color: white; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn.secondary { background: #1f2937; }
        .table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        .table th, .table td { text-align: left; padding: 12px 10px; border-bottom: 1px solid rgba(148, 163, 184, 0.16); }
        .table th { color: #93c5fd; font-weight: 600; }
        .muted { color: #94a3b8; }
        .error { color: #fca5a5; }
    </style>
</head>
<body>
<div class="page">
    <div class="hero" th:if="${shareInfo != null}">
        <h1 class="title" th:text="${shareInfo.shareName}">分享文件</h1>
        <div class="meta">
            <span class="badge" th:text="${shareInfo.fileCount + ' 个文件'}">0 个文件</span>
            <span th:if="${shareInfo.hasCheckCode}" class="badge">需要提取码</span>
            <span th:if="${!shareInfo.hasCheckCode}" class="badge">无需提取码</span>
            <span class="muted" th:if="${shareInfo.expireTime != null}" th:text="${'过期时间：' + shareInfo.expireTime}">过期时间</span>
            <span class="muted" th:text="${'浏览：' + shareInfo.viewCount}">浏览</span>
            <span class="muted" th:text="${'下载：' + shareInfo.downloadCount}">下载</span>
        </div>
    </div>

    <div class="panel" th:if="${shareInfo != null and shareInfo.hasCheckCode and (shareCode == null or shareCode.isBlank())}">
        <h2 style="margin:0 0 8px;">请输入提取码</h2>
        <p class="muted" style="margin:0 0 14px;">该分享受提取码保护，输入后即可查看文件列表。</p>
        <form class="form" method="get" th:action="@{/share/{shareId}(shareId=${shareInfo.shareId})}">
            <input class="input" name="shareCode" placeholder="提取码" />
            <button class="btn" type="submit">验证并查看</button>
        </form>
    </div>

    <div class="panel" th:if="${files != null}">
        <h2 style="margin:0 0 12px;">文件列表</h2>
        <table class="table">
            <thead>
            <tr>
                <th>名称</th>
                <th>大小</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="file : ${files}">
                <td>
                    <div th:text="${file.displayName}">文件名</div>
                    <div class="muted" th:text="${file.suffix}">suffix</div>
                </td>
                <td th:text="${file.size != null ? file.size + ' B' : '-'}">-</td>
                <td>
                    <a class="btn secondary" th:href="@{/shares/{shareId}/download/{fileId}(shareId=${shareInfo.shareId}, fileId=${file.fileId}, shareCode=${shareCode})}">
                        下载
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
