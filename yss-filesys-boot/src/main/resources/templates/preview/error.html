<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预览失败</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1320; color: #d9e2f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .card { width: min(640px, 92vw); border: 1px solid #27314a; background: #161d2f; padding: 24px; border-radius: 12px; }
        .title { margin: 0 0 10px; font-size: 20px; }
        .msg { margin: 0; color: #a8b4cf; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="title">文件预览失败</h1>
    <p class="msg" th:text="${errorMessage}">请稍后重试</p>
</div>
</body>
</html>
