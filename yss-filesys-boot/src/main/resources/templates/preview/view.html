<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${fileName}">文件预览</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #10141f; color: #f5f7fb; }
        .header { padding: 12px 16px; background: #161c2b; border-bottom: 1px solid #2a344c; font-size: 14px; }
        .wrap { width: 100vw; height: calc(100vh - 50px); display: flex; align-items: center; justify-content: center; }
        .unsupported { color: #c9d4ee; max-width: 720px; line-height: 1.6; }
        img, video, audio, iframe, pre { max-width: 100%; max-height: 100%; }
        iframe { width: 100%; height: 100%; border: 0; background: #fff; }
        pre { width: min(1200px, 95vw); height: calc(100vh - 90px); overflow: auto; background: #0b1120; padding: 16px; border: 1px solid #2a344c; }
    </style>
</head>
<body>
<div class="header" th:text="${fileName}">文件名</div>
<div class="wrap">
    <img th:if="${previewType == 'image'}" th:src="${streamUrl}" alt="image preview"/>
    <video th:if="${previewType == 'video'}" th:src="${streamUrl}" controls></video>
    <audio th:if="${previewType == 'audio'}" th:src="${streamUrl}" controls></audio>
    <iframe th:if="${previewType == 'pdf'}" th:src="${streamUrl}"></iframe>
    <iframe th:if="${previewType == 'text'}" th:src="${streamUrl}"></iframe>
    <div class="unsupported" th:if="${previewType == 'unsupported'}">
        当前文件类型暂不支持在线预览，请下载后查看。
    </div>
</div>
</body>
</html>
