<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${fileName}">文档预览</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1320; color: #d9e2f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .card { width: min(720px, 92vw); border: 1px solid #27314a; background: #161d2f; padding: 24px; border-radius: 12px; }
        .title { margin: 0 0 12px; }
        .desc { margin: 0; color: #a8b4cf; line-height: 1.6; }
        .hint { margin-top: 16px; padding: 12px 14px; background: #0b1120; border: 1px solid #2a344c; border-radius: 10px; color: #cbd5e1; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="title">OnlyOffice 文档预览扩展口</h1>
    <p class="desc">
        当前版本不做本地 Office/PDF 渲染，仅保留后续接入 OnlyOffice 的预览入口。
        文件：<span th:text="${fileName}"></span>
    </p>
    <div class="hint">
        未来这里会切换成 OnlyOffice 的在线编辑/预览 iframe。
    </div>
</div>
</body>
</html>
