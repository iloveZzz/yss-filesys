spring:
  application:
    name: yss-filesys
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3308/free-fs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      client-type: jedis
      host: localhost
      port: 30644
      jedis:
        pool:
          enabled: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  quartz:
    job-store-type: memory
    auto-startup: true
  profiles:
    active: nacos

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

yss:
  files:
    storage-root: /tmp/yss-filesys/storage
  preview:
    token-expire-seconds: 300

logging:
  level:
    com.yss.datamiddle.approval: DEBUG
    org.springframework.jdbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
